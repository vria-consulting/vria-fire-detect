<!-- @dsCard group="Components" viewport="700x230" subtitle="Pill jaune signature — 4 variantes, 3 tailles" name="Boutons" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../../styles.css"></head>
<body style="margin:0;padding:20px 24px;background:var(--paper);display:flex;flex-direction:column;gap:14px;">
<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
<button style="height:44px;padding:0 22px;font-family:var(--font-body);font-weight:500;font-size:15px;background:var(--canary);color:var(--charcoal);border:none;border-radius:999px;">Protéger ma zone</button>
<button style="height:44px;padding:0 22px;font-family:var(--font-body);font-weight:500;font-size:15px;background:var(--charcoal);color:var(--paper);border:none;border-radius:999px;">Voir la carte</button>
<button style="height:44px;padding:0 22px;font-family:var(--font-body);font-weight:500;font-size:15px;background:transparent;color:var(--ink);border:1px solid var(--line);border-radius:999px;">En savoir plus</button>
<button style="height:44px;padding:0 22px;font-family:var(--font-body);font-weight:500;font-size:15px;background:var(--ember);color:#fff;border:none;border-radius:999px;">Itinéraire d'évacuation</button>
</div>
<div style="display:flex;gap:12px;align-items:center;">
<button style="height:36px;padding:0 16px;font-family:var(--font-body);font-weight:500;font-size:14px;background:var(--canary);color:var(--charcoal);border:none;border-radius:999px;">s · 36</button>
<button style="height:44px;padding:0 22px;font-family:var(--font-body);font-weight:500;font-size:15px;background:var(--canary);color:var(--charcoal);border:none;border-radius:999px;">m · 44</button>
<button style="height:52px;padding:0 28px;font-family:var(--font-body);font-weight:500;font-size:16px;background:var(--canary);color:var(--charcoal);border:none;border-radius:999px;">l · 52</button>
<button style="height:44px;padding:0 22px;font-family:var(--font-body);font-weight:500;font-size:15px;background:var(--canary);color:var(--charcoal);border:none;border-radius:999px;opacity:.45;">Désactivé</button>
<button aria-label="icône" style="width:44px;height:44px;border-radius:50%;background:transparent;border:1px solid var(--line);color:var(--ink);font-size:18px;">✕</button>
</div>
</body></html>
