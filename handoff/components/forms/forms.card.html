<!-- @dsCard group="Components" viewport="700x240" subtitle="Champs, cases, interrupteurs — focus ring jaune" name="Formulaires" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../../styles.css"></head>
<body style="margin:0;padding:20px 24px;background:var(--paper);display:flex;gap:32px;">
<div style="display:flex;flex-direction:column;gap:14px;width:280px;">
<label style="display:flex;flex-direction:column;gap:6px;"><span style="font-size:14px;font-weight:500;">Ta commune</span><input placeholder="ex. Aix-en-Provence" style="height:48px;padding:0 16px;font-size:16px;font-family:var(--font-body);background:var(--white);border:1px solid var(--line);border-radius:var(--radius-m);outline:none;"><span style="font-size:12px;color:var(--ink-3);">On surveille un rayon de 30 km</span></label>
<label style="display:flex;flex-direction:column;gap:6px;"><span style="font-size:14px;font-weight:500;">Focus</span><input value="Valbonne" style="height:48px;padding:0 16px;font-size:16px;font-family:var(--font-body);background:var(--white);border:1px solid var(--canary-strong);border-radius:var(--radius-m);outline:none;box-shadow:var(--focus-ring);"></label>
</div>
<div style="display:flex;flex-direction:column;gap:18px;padding-top:4px;">
<span style="display:inline-flex;align-items:center;gap:10px;font-size:15px;"><span style="width:22px;height:22px;border-radius:7px;background:var(--canary);border:1px solid var(--canary-strong);display:inline-flex;align-items:center;justify-content:center;"><svg width="12" height="12" viewBox="0 0 12 12"><path d="M2,6.5 L4.8,9 L10,3" fill="none" stroke="#1B1C1E" stroke-width="2" stroke-linecap="round"/></svg></span>Alertes de nuit</span>
<span style="display:inline-flex;align-items:center;gap:10px;font-size:15px;"><span style="width:22px;height:22px;border-radius:7px;background:var(--white);border:1px solid var(--line);"></span>Signalements communautaires</span>
<span style="display:inline-flex;align-items:center;gap:12px;font-size:15px;"><span style="width:48px;height:28px;border-radius:999px;background:var(--canary);position:relative;display:inline-block;"><span style="position:absolute;top:3px;left:23px;width:22px;height:22px;border-radius:50%;background:var(--charcoal);"></span></span>Alertes push</span>
<span style="display:inline-flex;align-items:center;gap:12px;font-size:15px;color:var(--ink-2);"><span style="width:48px;height:28px;border-radius:999px;background:var(--line);position:relative;display:inline-block;"><span style="position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:var(--white);box-shadow:var(--shadow-s);"></span></span>SMS de secours</span>
</div>
</body></html>
