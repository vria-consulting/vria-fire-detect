<!DOCTYPE html><html><head><link rel="stylesheet" href="../../styles.css"></head>
<body style="margin:0;padding:20px 24px;background:var(--paper);display:flex;gap:20px;align-items:flex-start;">
<div style="background:var(--white);border-radius:var(--radius-l);padding:24px;box-shadow:var(--shadow-s);width:250px;display:flex;flex-direction:column;gap:8px;">
<span style="display:inline-flex;align-items:center;gap:7px;height:26px;padding:0 12px;border-radius:999px;background:var(--safe-soft);color:#1F6644;font-size:13px;font-weight:500;align-self:flex-start;"><span style="width:7px;height:7px;border-radius:50%;background:var(--safe);"></span>Rien à signaler</span>
<h3 style="font-size:20px;">Ma zone — Valbonne</h3>
<p style="margin:0;font-size:14px;color:var(--ink-2);">Kanari écoute · dernière vérification il y a 2 min</p>
</div>
<div style="display:flex;flex-direction:column;gap:12px;align-items:flex-start;padding-top:8px;">
<span style="display:inline-flex;align-items:center;gap:7px;height:26px;padding:0 12px;border-radius:999px;background:var(--ember-soft);color:#9C3B12;font-size:13px;font-weight:500;"><span style="width:7px;height:7px;border-radius:50%;background:var(--ember);animation:kanari-wave 1.8s ease-out infinite;"></span>Alerte en cours</span>
<span style="display:inline-flex;align-items:center;gap:7px;height:26px;padding:0 12px;border-radius:999px;background:var(--danger-soft);color:#9C2B2B;font-size:13px;font-weight:500;"><span style="width:7px;height:7px;border-radius:50%;background:var(--danger);"></span>Feu confirmé</span>
<span style="display:inline-flex;align-items:center;gap:7px;height:26px;padding:0 12px;border-radius:999px;background:var(--canary-soft);color:#7A5A00;font-size:13px;font-weight:500;"><span style="width:7px;height:7px;border-radius:50%;background:var(--canary-strong);"></span>Veille renforcée</span>
<span style="display:inline-flex;align-items:center;height:26px;padding:0 12px;border-radius:999px;background:var(--paper-2);color:var(--ink-2);font-size:13px;font-weight:500;">3 sources</span>
</div>
</body></html>
