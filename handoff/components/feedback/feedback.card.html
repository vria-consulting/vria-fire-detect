<!-- @dsCard group="Components" viewport="700x300" subtitle="Alertes sourcées + toast charbon" name="Feedback" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../../styles.css"></head>
<body style="margin:0;padding:20px 24px;background:var(--paper);display:flex;flex-direction:column;gap:14px;">
<div style="background:var(--ember-soft);border:1.5px solid var(--ember);border-radius:var(--radius-l);padding:18px 22px;display:flex;flex-direction:column;gap:6px;max-width:560px;">
<strong style="font-family:var(--font-display);font-weight:500;font-size:18px;color:#9C3B12;">Départ de feu probable à 6 km</strong>
<span style="font-size:15px;">Prépare un sac. Surveille les mises à jour.</span>
<span style="font-size:13px;color:var(--ink-2);">signalé il y a 9 min · 3 sources · confirmé par satellite</span>
</div>
<div style="display:flex;gap:14px;">
<div style="background:var(--safe-soft);border:1.5px solid var(--safe);border-radius:var(--radius-l);padding:14px 20px;font-size:15px;flex:1;">Rien à signaler autour de toi. Kanari écoute.</div>
<div style="background:var(--charcoal);color:var(--paper);border-radius:var(--radius-m);padding:14px 18px;box-shadow:var(--shadow-l);display:flex;gap:12px;max-width:320px;">
<span style="width:8px;height:8px;border-radius:50%;background:var(--canary);margin-top:6px;animation:kanari-wave 1.8s ease-out infinite;"></span>
<div style="display:flex;flex-direction:column;gap:2px;"><strong style="font-size:15px;">Zone protégée</strong><span style="font-size:14px;opacity:.75;">Kanari surveille Valbonne et 30 km autour.</span></div>
</div>
</div>
</body></html>
