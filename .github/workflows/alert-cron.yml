# Cron d'alertes : vérifie les nouveaux foyers toutes les 5 minutes et envoie
# les notifications push. GitHub Actions sert de déclencheur gratuit (le plan
# Vercel Hobby ne permet pas de cron < 1 jour).
name: alert-cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Déclenche la vérification des foyers
        run: |
          curl -fsS --max-time 55 \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "https://vria-fire-detect.vercel.app/api/cron/check"
